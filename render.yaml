services:
  - type: web
    name: interactive-xai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ART_DIR
        value: artifacts
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_REQUIRED
        value: "false"
      - key: USER_TOKENS
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_PER_MIN
        value: "60"
